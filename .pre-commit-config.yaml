repos:
  - repo: local
    hooks:
      - id: terraform-fmt
        name: terraform fmt
        entry: terraform fmt -check -recursive
        language: system
        pass_filenames: false
      - id: validate-stack
        name: validate stack
        entry: bash -lc 'terraform stacks init >/dev/null && terraform stacks validate'
        language: system
        pass_filenames: false
